<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1a2e; --mid: #4a4a6a; --faint: #9090b0;
    --bg: #f5f5fa; --white: #ffffff;
    --accent: #5b4cdb; --accent-light: #ede9ff; --accent-mid: #8b7ee8;
    --border: #e0e0ef; --pin: #e84855;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { background: var(--white); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 20px; flex-shrink: 0; z-index: 1000; box-shadow: 0 1px 8px rgba(91,76,219,0.06); }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  h1 { font-size: 18px; font-weight: 600; color: var(--ink); letter-spacing: -0.3px; }
  .subtitle { font-size: 12px; color: var(--faint); font-family: 'DM Mono', monospace; }
  .header-controls { display: flex; align-items: center; gap: 10px; margin-left: auto; flex-wrap: wrap; }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--faint); pointer-events: none; }
  #search { font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 12px 8px 34px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--ink); width: 220px; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
  #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  #search::placeholder { color: var(--faint); }
  .btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--white); color: var(--mid); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn:hover { background: var(--bg); border-color: var(--accent-mid); color: var(--accent); }
  .btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .stat-pill { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; padding: 5px 10px; border-radius: 20px; background: var(--accent-light); color: var(--accent); white-space: nowrap; }
  .main { display: flex; flex: 1; overflow: hidden; }
  #sidebar { width: 260px; flex-shrink: 0; background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 500; color: var(--faint); text-transform: uppercase; letter-spacing: 0.8px; font-family: 'DM Mono', monospace; }
  #city-list { overflow-y: auto; flex: 1; }
  #city-list::-webkit-scrollbar { width: 4px; }
  #city-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .city-item { padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.1s; gap: 8px; }
  .city-item:hover { background: var(--bg); }
  .city-item.active { background: var(--accent-light); }
  .city-name { font-size: 13px; font-weight: 500; color: var(--ink); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .city-count { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 10px; background: var(--border); color: var(--mid); flex-shrink: 0; }
  .city-item.active .city-count { background: var(--accent); color: var(--white); }
  .country-header { padding: 8px 16px 4px; font-size: 10px; font-weight: 600; color: var(--faint); text-transform: uppercase; letter-spacing: 1px; font-family: 'DM Mono', monospace; background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1; display: flex; align-items: center; justify-content: space-between; }
  .country-emp-count { font-size: 10px; color: var(--faint); font-family: 'DM Mono', monospace; }
  .country-header { cursor: pointer; user-select: none; }
  .country-header:hover { background: var(--border); }
  .country-chevron { margin-left: 6px; transition: transform 0.2s; display: inline-block; font-size: 10px; color: var(--faint); }
  .country-header.open .country-chevron { transform: rotate(90deg); }
  .country-cities { display: none; }
  .country-cities.open { display: block; }
  .no-results { padding: 24px 16px; font-size: 13px; color: var(--faint); text-align: center; }
  #map { flex: 1; }
  .leaflet-popup-content-wrapper { border-radius: 10px; box-shadow: 0 4px 20px rgba(26,26,46,0.15); border: 1px solid var(--border); font-family: 'DM Sans', sans-serif; padding: 0; overflow: hidden; }
  .leaflet-popup-content { margin: 0; }
  .popup-inner { padding: 14px 16px; min-width: 160px; }
  .popup-city { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
  .popup-badge { display: inline-block; background: var(--accent-light); color: var(--accent); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; font-family: 'DM Mono', monospace; }
  .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large { background-color: rgba(91,76,219,0.15) !important; }
  .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div { background-color: rgba(91,76,219,0.85) !important; color: white !important; font-family: 'DM Mono', monospace !important; font-weight: 600 !important; }
</style>

  attribution:'&copy; OpenStreetMap contributors &copy; CARTO', maxZoom:18, noWrap:true
}).addTo(map);

function makeIcon(count) {
  const s = count>3?36:count>1?30:26;
  return L.divIcon({
    html:`<div style="width:${s}px;height:${s}px;background:#e84855;border:2.5px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(232,72,85,0.35);display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(45deg);color:#fff;font-size:10px;font-family:'DM Mono',monospace;font-weight:600;">${count}</span></div>`,
    className:'',iconSize:[s,s],iconAnchor:[s/2,s],popupAnchor:[0,-s]
  });
}

let clustered=true;
const clusterGroup=L.markerClusterGroup({
  maxClusterRadius:80,
  showCoverageOnHover:false,
  iconCreateFunction: function(cluster){
    const count = cluster.getChildCount();
    const size = count >= 50 ? 52 : count >= 20 ? 44 : count >= 10 ? 38 : count >= 5 ? 32 : 26;
    return L.divIcon({
      html: '<div style="width:'+size+'px;height:'+size+'px;background:rgba(91,76,219,0.85);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-family:DM Mono,monospace;font-weight:600;font-size:'+(size>38?13:11)+'px;box-shadow:0 2px 8px rgba(91,76,219,0.4);">'+count+'</div>',
      className: '',
      iconSize: [size, size]
    });
  }
});

const markers={};
let activeCity=null;

const invisibleIcon = L.divIcon({html:'',className:'',iconSize:[1,1]});

const OFFICES = [
  {name:"Brussels HQ",city:"Brussels",country:"Belgium",lat:50.8503,lng:4.3517,count:99},
  {name:"Lisbon",city:"Lisbon",country:"Portugal",lat:38.7169,lng:-9.1399,count:61},
  {name:"Williamsport",city:"Williamsport, PA",country:"USA",lat:41.2412,lng:-77.0011,count:21},

  {name:"Tokyo",city:"Tokyo",country:"Japan",lat:35.6762,lng:139.6503,count:6},
  {name:"Shanghai",city:"Shanghai",country:"China",lat:31.2304,lng:121.4737,count:11},
  {name:"Toronto",city:"Toronto",country:"Canada",lat:43.6532,lng:-79.3832,count:13}
];

function makeOfficeIcon(count) {
  const w=count>=50?30:count>=20?26:count>=10?24:22;
  const h=w;
  const fs=count>=100?11:count>=10?12:13;
  return L.divIcon({
    html:`<div style="width:${w}px;height:${h}px;background:#1a1a2e;border:2.5px solid #fff;border-radius:4px;box-shadow:0 2px 8px rgba(26,26,46,0.4);display:flex;align-items:center;justify-content:center;"><span style="color:#fff;font-size:${fs}px;font-family:DM Mono,monospace;font-weight:600;">${count}</span></div>`,
    className:'',
    iconSize:[w,h],
    iconAnchor:[w/2,h],
    popupAnchor:[0,-h]
  });
}

const officeLayerGroup = L.layerGroup();
OFFICES.forEach(office => {
  const m = L.marker([office.lat, office.lng], {icon: makeOfficeIcon(office.count||0)});
  m.bindPopup(`<div class="popup-inner"><div class="popup-city">${office.name}</div><div class="popup-row" style="color:var(--mid);font-size:12px;">${office.country}</div><div style="margin-top:6px"><span class="popup-badge" style="background:#1a1a2e;color:#fff;">Enhesa Office</span><span class="popup-badge" style="background:#1a1a2e;color:#fff;">${office.count} employees</span></div></div>`, {maxWidth:220,minWidth:160});
  officeLayerGroup.addLayer(m);
});
officeLayerGroup.addTo(map);




LOCATIONS.forEach(loc=>{
  const c=COORDS[loc.city];
  if(!c)return;
  const countryLabel = loc.country ? '<div class="popup-row" style="color:var(--mid);font-size:12px;margin-bottom:4px;">' + loc.country + '</div>' : ''; const popup=`<div class="popup-inner"><div class="popup-city">${loc.city}</div>${countryLabel}<div><span class="popup-badge">${loc.count} employee${loc.count!==1?'s':''}</span></div></div>`;
  const m=L.marker(c,{icon:makeIcon(loc.count)});
  m.bindPopup(popup,{maxWidth:220,minWidth:160});
  clusterGroup.addLayer(m);
  rawGroup.addLayer(m);
  markers[loc.city]=m;
  for(let i=1;i<loc.count;i++){
    const offset=[c[0]+i*0.0001,c[1]+i*0.0001];
    const ghost=L.marker(offset,{icon:invisibleIcon});
    ghost.bindPopup(popup,{maxWidth:220,minWidth:160});
    clusterGroup.addLayer(ghost);
  }
});
map.addLayer(clusterGroup);

let filteredData=[...LOCATIONS];
const COUNTRY_NAMES = {
  GBR:"United Kingdom", USA:"United States", PRT:"Portugal", PHL:"Philippines",
  FRA:"France", ESP:"Spain", IND:"India", BRA:"Brazil", CAN:"Canada", IRL:"Ireland",
  MEX:"Mexico", RUS:"Russia", SWE:"Sweden", DEU:"Germany", DNK:"Denmark", DOM:"Dominican Republic",
  EST:"Estonia", FIN:"Finland", ITA:"Italy", KNA:"St Kitts & Nevis", LUX:"Luxembourg",
  NLD:"Netherlands", UAE:"UAE", POL:"Poland", ROU:"Romania", UKR:"Ukraine",
  Belgium:"Belgium", Japan:"Japan", China:"China"
};

function renderSidebar(data, openCountries=null){
  const list=document.getElementById('city-list');
  if(!data.length){list.innerHTML='<div class="no-results">No cities found</div>';return;}
  const groups={};
  data.forEach(loc=>{
    const c=loc.country||'GBR';
    if(!groups[c])groups[c]=[];
    groups[c].push(loc);
  });
  // Sort countries by total employee count descending
  const sorted=Object.keys(groups).sort((a,b)=>{
    const totalA=groups[a].reduce((s,l)=>s+l.count,0);
    const totalB=groups[b].reduce((s,l)=>s+l.count,0);
    return totalB-totalA;
  });
  let html='';

  // Offices section at the top
  const officesOpen = openCountries ? openCountries.has('__offices__') : false;
  html+=`<div class="country-header${officesOpen?' open':''}" data-country="__offices__" style="border-top:2px solid var(--accent);">
    <span>🏢 Enhesa Offices<span class="country-chevron">›</span></span>
    <span class="country-emp-count">${OFFICES.length}</span>
  </div>`;
  html+=`<div class="country-cities${officesOpen?' open':''}" data-country-cities="__offices__">`;
  [...OFFICES].sort((a,b)=>a.city.localeCompare(b.city)).forEach(office=>{
    const key='__office__'+office.city;
    html+=`<div class="city-item${activeCity===key?' active':''}" data-city="${key}" data-lat="${office.lat}" data-lng="${office.lng}" data-name="${office.name}"><div class="city-name">${office.city}</div><div class="city-count" style="background:#1a1a2e;color:#fff;">${office.count}</div></div>`;
  });
  html+='</div>';

  sorted.forEach(country=>{
    const cities=groups[country].sort((a,b)=>a.city.localeCompare(b.city));
    const total=cities.reduce((s,l)=>s+l.count,0);
    const isOpen = openCountries ? openCountries.has(country) : false;
    html+=`<div class="country-header${isOpen?' open':''}" data-country="${country}">
      <span>${COUNTRY_NAMES[country]||country}<span class="country-chevron">›</span></span>
      <span class="country-emp-count">${total}</span>
    </div>`;
    html+=`<div class="country-cities${isOpen?' open':''}" data-country-cities="${country}">`;
    cities.forEach(loc=>{
      html+=`<div class="city-item${activeCity===loc.city?' active':''}" data-city="${loc.city}"><div class="city-name">${loc.city}</div><div class="city-count">${loc.count}</div></div>`;
    });
    html+='</div>';
  });
  list.innerHTML=html;
  list.querySelectorAll('.city-item').forEach(el=>el.addEventListener('click',()=>{
    const city=el.dataset.city;
    if(city.startsWith('__office__')){
      if(activeCity===city){
        activeCity=null;
        renderSidebar(filteredData, getOpenCountries());
        map.setView([20,10],2,{animate:true});
        map.closePopup();
        return;
      }
      activeCity=city;
      renderSidebar(filteredData, getOpenCountries());
      const lat=parseFloat(el.dataset.lat);
      const lng=parseFloat(el.dataset.lng);
      map.setView([lat,lng],11,{animate:true});
    } else {
      focusCity(city);
    }
  }));
  list.querySelectorAll('.country-header').forEach(el=>el.addEventListener('click',()=>{
    const country=el.dataset.country;
    el.classList.toggle('open');
    const citiesEl=list.querySelector('[data-country-cities="'+country+'"]');
    if(citiesEl)citiesEl.classList.toggle('open');
  }));
}

function focusCity(city){
  if(activeCity===city){
    // Unclick - reset to world view
    activeCity=null;
    renderSidebar(filteredData, getOpenCountries());
    map.setView([20,10],2,{animate:true});
    map.closePopup();
    return;
  }
  activeCity=city;
  renderSidebar(filteredData, getOpenCountries());
  const c=COORDS[city];
  if(!c)return;
  map.setView(c,11,{animate:true});
  const m=markers[city];
  if(m){if(clustered)clusterGroup.zoomToShowLayer(m,()=>m.openPopup());else m.openPopup();}
}

renderSidebar(LOCATIONS, getOpenCountries());

function getOpenCountries(){
  const list=document.getElementById('city-list');
  const open=new Set();
  list.querySelectorAll('.country-header.open').forEach(el=>open.add(el.dataset.country));
  return open;
}

document.getElementById('search').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  filteredData=LOCATIONS.filter(l=>l.city.toLowerCase().includes(q));
  activeCity=null;
  renderSidebar(filteredData, getOpenCountries());
  const total=filteredData.reduce((s,l)=>s+l.count,0);
  document.getElementById('stat').textContent=`${filteredData.length} cities · ${total} employees`;
});

document.getElementById('toggle-cluster').addEventListener('click',function(){
  clustered=!clustered;
  this.textContent=clustered?'Uncluster':'Cluster';
  this.classList.toggle('active',!clustered);
  if(clustered){map.removeLayer(rawGroup);map.addLayer(clusterGroup);}
  else{map.removeLayer(clusterGroup);map.addLayer(rawGroup);}
});

document.getElementById('reset-btn').addEventListener('click',()=>{
  map.setView([20,10],2,{animate:true});
  activeCity=null;
  document.getElementById('search').value='';
  filteredData=[...LOCATIONS];
  renderSidebar(filteredData, getOpenCountries());
  document.getElementById('stat-remote').textContent='258';
});
</script>
